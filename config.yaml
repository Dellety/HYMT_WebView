# 本地翻译器配置
# 修改后重启应用生效

# ===== 引擎生命周期 =====
# 应用启动时是否自动加载引擎（spawn llama-server）。
# true: 启动即加载（默认，开箱即用）
# false: 需手动点击界面上的「启动引擎」按钮
auto_start: true

# 关闭窗口时的引擎处理策略：
# true:  强制清理 —— 直接停止引擎并退出（默认，确保不残留）
# false: 弹窗确认 —— 引擎运行时关闭会弹出确认对话框
force_kill_on_exit: true

# ===== llama.cpp 路径 =====
# llama.cpp 所在目录（包含 llama-server 可执行文件的目录），或直接指向可执行文件。
# 留空则按以下顺序自动检测：
#   1. 本目录下的 llama-*-bin-* 子目录（Windows 常见分发格式）
#   2. 本目录下的 lib/llama-server 或 ./llama-server
#   3. 系统 PATH
# 示例: /opt/homebrew/bin, C:\llama.cpp, ./llama-b3974-bin-win-avx2
llamacpp_dir: ./llama

# ===== 模型 =====
# models/ 目录下的 .gguf 文件名。若该文件不存在，则自动选取 models/ 下最大的 .gguf。
model: Hy-MT2-1.8B-Q8_0.gguf

# ===== 推理参数 =====
temperature: 0.7
top_p: 0.6
top_k: 20
repeat_penalty: 1.05
max_tokens: 2048
context_size: 4096

# ===== 目标语言 =====
# auto: 自动检测（默认，中文→英文，外文→中英双语）
# 或指定固定目标语言（实测 Hy-MT2-1.8B 支持良好的语言）：
#   English / Chinese / Japanese / Korean / German / Spanish
# 指定后，无论输入什么语言都翻译到该语言。
target_language: auto
