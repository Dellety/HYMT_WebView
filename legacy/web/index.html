<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地翻译器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <span id="status" class="status-disconnected">正在连接...</span>
      <span id="detect-info" class="detect-info"></span>
    </div>

    <div class="panels">
      <div class="panel input-panel">
        <div class="panel-header">
          <span id="source-lang" class="lang-label">输入文本</span>
          <button id="clear-btn" class="btn-small">清空</button>
        </div>
        <textarea id="source-text" placeholder="在此输入文本，自动识别语言并翻译..." rows="12"></textarea>
        <div class="panel-footer">
          <span id="source-count" class="char-count">0 字符</span>
          <button id="translate-btn" class="btn-primary">翻译</button>
        </div>
      </div>

      <div class="panel output-panel">
        <div class="panel-header">
          <span id="target-lang" class="lang-label">翻译结果</span>
          <button id="copy-btn" class="btn-small">复制</button>
        </div>
        <textarea id="result-text" placeholder="翻译结果将显示在这里" rows="12" readonly></textarea>
        <div class="panel-footer">
          <span id="result-count" class="char-count">0 字符</span>
          <span id="time-info" class="time-info"></span>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
