# 本地翻译器配置
# 修改后重启服务生效

# llama.cpp 目录（包含 llama-server 可执行文件的目录）
# 留空则自动检测 PATH 和项目目录下的 llama-*-bin-* 文件夹
# 示例: /opt/homebrew/bin, C:\llama.cpp, ./llama-b3974-bin-win-avx2
llamacpp_dir:

# 模型文件名（models/ 目录下的 .gguf 文件）
model: Hy-MT2-1.8B-Q4_K_M.gguf

# 推理参数
temperature: 0.7
top_p: 0.6
top_k: 20
repeat_penalty: 1.05
max_tokens: 2048
context_size: 4096
